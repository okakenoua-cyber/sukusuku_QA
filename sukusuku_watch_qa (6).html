<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>すくすくウォッチ Q&Aアシスタント</title>
  <style>
    :root {
      --clr-primary:  #4a7c59;
      --clr-p-light:  #5e9970;
      --clr-p-bg:     #e9f2ec;
      --clr-user-bub: #4a7c59;
      --clr-ai-bub:   #ffffff;
      --clr-chat-bg:  #ddeae0;
      --clr-border:   #c2d6c8;
      --clr-text:     #2d3a2e;
      --clr-sub:      #6b7f6d;
      --clr-logo:     #e8621a;
      --font: 'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:var(--clr-p-bg);height:100vh;display:flex;flex-direction:column;overflow:hidden;color:var(--clr-text);}

    /* ヘッダー */
    #hdr{background:var(--clr-primary);color:#fff;padding:9px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 6px rgba(0,0,0,.2);flex-shrink:0;}
    .hdr-title{font-size:19px;font-weight:700;letter-spacing:.02em;}
    .hdr-sub{font-size:10px;opacity:.85;margin-top:1px;}

    /* 説明バー */
    #info-bar{background:#fff;border-bottom:1px solid var(--clr-border);padding:6px 14px;font-size:12px;color:var(--clr-sub);flex-shrink:0;line-height:1.5;}

    /* チャット */
    #chat{flex:1;overflow-y:auto;padding:13px 12px;display:flex;flex-direction:column;gap:10px;background:var(--clr-chat-bg);}
    #chat::-webkit-scrollbar{width:4px;}
    #chat::-webkit-scrollbar-thumb{background:#b0c8b5;border-radius:2px;}

    /* メッセージ行 */
    .row{display:flex;gap:7px;max-width:88%;}
    .row.user{align-self:flex-end;flex-direction:row-reverse;}
    .row.ai{align-self:flex-start;}

    /* アバター */
    .av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;overflow:hidden;}
    .av.ai{background:transparent;border:none;border-radius:0;overflow:visible;flex-direction:column;width:38px;height:auto;gap:3px;align-items:center;margin-top:0;}
    .av.usr{background:#7fa88a;color:#fff;font-size:14px;}
    .av-label{font-size:8.5px;color:var(--clr-sub);font-weight:700;text-align:center;line-height:1.3;white-space:nowrap;}
    .sender-name{font-size:11px;color:var(--clr-sub);padding-left:2px;margin-bottom:2px;font-weight:600;}

    /* 吹き出し */
    .bbl{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.65;box-shadow:0 1px 3px rgba(0,0,0,.1);word-break:break-word;white-space:pre-wrap;max-width:100%;}
    .row.user .bbl{background:var(--clr-user-bub);color:#fff;border-top-right-radius:4px;}
    .row.ai  .bbl{background:var(--clr-ai-bub);color:var(--clr-text);border-top-left-radius:4px;}
    .ts{font-size:10px;color:var(--clr-sub);align-self:flex-end;padding:0 2px;}

    /* タイピング */
    .typing{display:flex;align-items:center;gap:5px;padding:4px 0;}
    .dot{width:7px;height:7px;background:#a0bba5;border-radius:50%;animation:bounce 1.3s infinite ease-in-out;}
    .dot:nth-child(2){animation-delay:.2s;}
    .dot:nth-child(3){animation-delay:.4s;}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}

    /* よくある質問ボタン */
    #quick-replies{background:#fff;border-top:1px solid var(--clr-border);padding:7px 10px;display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0;}
    .qr{background:var(--clr-p-bg);border:1px solid var(--clr-border);border-radius:14px;padding:4px 11px;font-size:12px;color:var(--clr-primary);cursor:pointer;font-family:var(--font);white-space:nowrap;transition:background .15s;}
    .qr:hover{background:#c8dece;}

    /* 入力エリア */
    #inp-area{background:#fff;border-top:1px solid var(--clr-border);padding:9px 12px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
    #usr-inp{flex:1;padding:9px 14px;border:1px solid var(--clr-border);border-radius:20px;font-size:14px;font-family:var(--font);resize:none;outline:none;line-height:1.45;max-height:120px;overflow-y:auto;transition:border-color .2s;}
    #usr-inp:focus{border-color:var(--clr-primary);}
    #send{width:40px;height:40px;background:var(--clr-primary);border:none;border-radius:50%;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .1s;}
    #send:hover:not(:disabled){background:var(--clr-p-light);}
    #send:active:not(:disabled){transform:scale(.92);}
    #send:disabled{background:#b0c8b5;cursor:not-allowed;}

    /* フッター */
    #footer{text-align:center;font-size:11px;color:#aaa;padding:5px 0 6px;background:#fff;border-top:1px solid var(--clr-border);flex-shrink:0;}
  </style>
</head>
<body>

<div id="hdr">
  <div>
    <div class="hdr-title">すくすくウォッチ Q&amp;Aアシスタント</div>
    <div class="hdr-sub">令和8年度 小学生すくすくウォッチ 実施のてびき（堺市版）</div>
  </div>
</div>

<div id="info-bar">📋 「令和8年度 小学生すくすくウォッチ 実施のてびき（堺市版）」の内容に基づいて回答します。てびき外の内容はお答えできません。</div>

<div id="chat">
  <div class="row ai">
    <div class="av ai" id="av-tpl"></div>
    <div>
      <div class="sender-name">教育委員会事務局</div>
      <div class="bbl">ご質問をどうぞ。下のボタンからよくある質問を選ぶこともできます。</div>
    </div>
  </div>
</div>

<div id="quick-replies">
  <button class="qr" onclick="setSQ(this)">実施期間は？</button>
  <button class="qr" onclick="setSQ(this)">5年生のテスト構成は？</button>
  <button class="qr" onclick="setSQ(this)">6年生のテスト構成は？</button>
  <button class="qr" onclick="setSQ(this)">堺市のアンケートは？</button>
  <button class="qr" onclick="setSQ(this)">問題冊子が届かない場合は？</button>
  <button class="qr" onclick="setSQ(this)">①表紙の管理方法は？</button>
  <button class="qr" onclick="setSQ(this)">解答用紙の返送方法は？</button>
  <button class="qr" onclick="setSQ(this)">コールセンターの電話番号は？</button>
</div>

<div id="inp-area">
  <textarea id="usr-inp" rows="1" placeholder="質問を入力してください（Shift+Enter で改行）"></textarea>
  <button id="send" onclick="send()" title="送信（Enter）">&#10148;</button>
</div>

<div id="footer">©堺市教育センター　能力開発課　研究G</div>

<script>
'use strict';

/* =====================================================
   AIアバター SVG
   ===================================================== */
function aiAvatarSVG() {
  return `<svg viewBox="0 0 80 80" width="34" height="34" xmlns="http://www.w3.org/2000/svg">
    <circle cx="40" cy="40" r="38" fill="#1e3a5f" stroke="#e8621a" stroke-width="5"/>
    <circle cx="40" cy="28" r="14" fill="white"/>
    <path d="M8,80 Q8,52 40,50 Q72,52 72,80Z" fill="white"/>
  </svg><span class="av-label">教育委員会<br>事務局</span>`;
}
document.getElementById('av-tpl').innerHTML = aiAvatarSVG();

/* =====================================================
   Q&Aデータベース（てびきの内容に基づく）
   ===================================================== */

  {
    kw: ['前日','準備','持ち物','文房具','鉛筆','消しゴム','用意'],
    a: `【実施日前日までの準備】\n\n【児童への連絡（持ち物）】\n・HBまたはBの黒鉛筆（シャープペンシルも可）\n・消しゴム\n※ボールペンは使用不可。上記以外は使用しない。\n\n【教室の準備】\n・テストに影響する掲示物を外す・覆う・裏返す\n・机をテストに適した配置に並び替える\n・机・椅子・壁等に落書きがないことを確認する\n\n参考：p.15`

  {
    kw: ['実施日','5年生','当日','手順','作業','配付'],
    a: `【5年生 実施日の主な手順】\n①テスト前：解答用紙セットを配付し①表紙に名前等を記入させる\n②各テスト時：当該時限の解答用紙のみを切り離して配付\n③実施時間：国語・算数46分、理科23分、わくわく問題50分\n④終了後：消しゴムのカスを確認させてから回収\n⑤最終テスト後：①表紙を必ず回収\n\n⚠️ 遅刻・早退で1教科のみの場合は学校記入欄に未実施教科をマークする（マークがないと無解答扱い）\n\n参考：p.17〜21`

  {
    kw: ['実施日','6年生','当日','手順','作業'],

  {

/* =====================================================
   キーワードマッチング検索
   ===================================================== */
function normalize(text) {
  return text.replace(/[　\s！？。、「」『』【】・…]/g, '').toLowerCase();
}

function getLocalAnswer(question) {
  const qNorm = normalize(question);
  let bestScore = 0;
  let bestEntry = null;

  for (const entry of QA_DB) {
    let score = 0;
    for (const kw of entry.kw) {
      const kwNorm = normalize(kw);
      if (qNorm.includes(kwNorm)) {
        score += kwNorm.length * 2; // 長いキーワードほど高スコア
      }
    }
    // 部分一致（2文字以上の語）でも加点
    const words = qNorm.match(/.{2}/g) || [];
    for (const w of words) {
      if (entry.kw.some(k => normalize(k).includes(w))) score += 1;
    }
    if (score > bestScore) {
      bestScore = score;
      bestEntry = entry;
    }
  }

  if (bestScore < 2 || !bestEntry) {
    return 'この件についてはてびきの該当箇所が確認できませんでした。\n\n別のキーワードでお試しいただくか、\n教育センター　能力開発課　研究グループ（072-270-8120）\nまたはコールセンター（0570-002-216）へお問い合わせください。';
  }
  return bestEntry.a;
}

/* =====================================================
   アプリ状態
   ===================================================== */
const S = { loading: false };

/* =====================================================
   メッセージ送信
   ===================================================== */
function send() {
  const inp = document.getElementById('usr-inp');
  const q   = inp.value.trim();
  if (!q || S.loading) return;

  addUser(q);
  inp.value = '';
  resize(inp);

  const tid = showTyping();
  S.loading = true;
  document.getElementById('send').disabled = true;

  // 自然な応答感のための短い遅延
  setTimeout(() => {
    removeTyping(tid);
    addAI(getLocalAnswer(q));
    S.loading = false;
    document.getElementById('send').disabled = false;
  }, 600);
}

/* =====================================================
   UI 操作
   ===================================================== */
function addUser(text) {
  append(`<div class="row user">
    <span class="ts">${now()}</span>
    <div class="bbl">${esc(text)}</div>
    <div class="av usr">👤</div>
  </div>`);
}

function addAI(text) {
  append(`<div class="row ai">
    <div class="av ai">${aiAvatarSVG()}</div>
    <div>
      <div class="sender-name">教育委員会事務局</div>
      <div class="bbl">${esc(text)}</div>
      <span class="ts" style="padding-left:4px">${now()}</span>
    </div>
  </div>`);
}

function showTyping() {
  const id = 'ty' + Date.now();
  append(`<div class="row ai" id="${id}">
    <div class="av ai">${aiAvatarSVG()}</div>
    <div class="bbl"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
  </div>`);
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function append(html) {
  const c = document.getElementById('chat');
  c.insertAdjacentHTML('beforeend', html);
  c.scrollTop = c.scrollHeight;
}

function setSQ(btn) {
  const inp = document.getElementById('usr-inp');
  inp.value = btn.textContent.trim();
  inp.focus();
  resize(inp);
}

/* =====================================================
   ユーティリティ
   ===================================================== */
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
          .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
          .replace(/\n/g,'<br>');
}
function now() {
  const d = new Date();
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

const inp = document.getElementById('usr-inp');
inp.addEventListener('input', () => resize(inp));
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
</script>
